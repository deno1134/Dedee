services:
  - type: web
    name: shadowgarden-web
    rootDir: web
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    region: frankfurt
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
    headers:
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=604800
