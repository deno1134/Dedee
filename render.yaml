databases:
  - name: denicord-database
    databaseName: denicord
    user: denicord_user

services:
  # Backend API Server
  - type: web
    name: denicord-backend
    env: node
    plan: starter
    region: oregon
    rootDir: ./server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: denicord-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://denicord-frontend.onrender.com
    healthCheckPath: /api/health

  # Frontend Web Service
  - type: web
    name: denicord-frontend
    env: node
    plan: starter
    region: oregon
    rootDir: ./desktop
    buildCommand: npm install && npm run build:web
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://denicord-backend.onrender.com
      - key: VITE_WS_URL
        value: https://denicord-backend.onrender.com

# Environment Variables for all services
envVarGroups:
  - name: shared-config
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: UTC