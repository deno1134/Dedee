databases:
  - name: denicord-database
    databaseName: denicord
    user: denicord_user
    plan: free

services:
  # Backend API Server (Free Web Service)
  - type: web
    name: denicord-backend
    env: node
    plan: free
    region: oregon
    rootDir: ./server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: denicord-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://denicord-frontend.onrender.com
    healthCheckPath: /api/health

# Environment Variables for all services
envVarGroups:
  - name: shared-config
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: UTC